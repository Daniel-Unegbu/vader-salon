<!--
  Card component samples.
  You can use this as a template when editing the homepage.
-->

<!-- Services Card -->
<div class="group bg-neutral-900 border border-white/5 rounded-2xl p-6 hover:border-amber-500/30 transition-all duration-500 hover:-translate-y-1">
  <div class="w-12 h-12 rounded-xl bg-amber-500/10 flex items-center justify-center mb-5">
    <!-- Replace icon with <img src="/assets/..."> if desired -->
  </div>
  <h3 class="font-serif text-xl font-bold text-white mb-3">{{title}}</h3>
  <p class="text-gray-400 text-sm leading-relaxed mb-5">{{description}}</p>
  <a class="inline-flex items-center gap-1.5 text-amber-500 hover:text-amber-400 text-sm font-semibold transition-colors" href="{{href}}" data-discover="true">
    View {{title}} <span class="text-lg leading-none">→</span>
  </a>
</div>
